name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # GitHub's ubuntu runners ship with the Android SDK preinstalled
      # (ANDROID_HOME is set), so :app is included automatically.
      - name: Run core simulation tests
        run: ./gradlew :core:test

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadow-village-defense-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-reports
          path: core/build/reports/tests/test
